name: Deploy Edge Functions

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  discover-functions:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.discover.outputs.functions }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover deployable functions
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t funcs < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | grep -Ev '^(_shared|shadow-replay|project-query|striking-detect)$')
          if [[ "${#funcs[@]}" -eq 0 ]]; then
            echo "No deployable functions found under supabase/functions" >&2
            exit 1
          fi
          json=$(printf '%s\n' "${funcs[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "functions=$json" >> "$GITHUB_OUTPUT"
          echo "count=${#funcs[@]}" >> "$GITHUB_OUTPUT"
          echo "Discovered ${#funcs[@]} deployable functions"
          printf '%s\n' "${funcs[@]}"

  deploy:
    needs: discover-functions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(needs.discover-functions.outputs.functions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin to known-good version. `latest` caused deno.lock v5
          # incompatibility that broke 14/19 deploys. Bump intentionally.
          version: 2.76.8

      - name: Resolve verify_jwt contract
        id: auth-contract
        shell: bash
        run: |
          set -euo pipefail
          fn="${{ matrix.function }}"
          expected="$(python3 - "${fn}" <<'PY'
          import pathlib
          import sys
          import tomllib

          fn = sys.argv[1]
          root = pathlib.Path(".")

          expected = None
          fn_cfg = root / "supabase" / "functions" / fn / "config.toml"
          if fn_cfg.exists():
              cfg = tomllib.loads(fn_cfg.read_text())
              if isinstance(cfg.get("verify_jwt"), bool):
                  expected = cfg["verify_jwt"]
              else:
                  section = cfg.get("function")
                  if isinstance(section, dict) and isinstance(section.get("verify_jwt"), bool):
                      expected = section["verify_jwt"]

          if expected is None:
              project_cfg_path = root / "supabase" / "config.toml"
              if project_cfg_path.exists():
                  project_cfg = tomllib.loads(project_cfg_path.read_text())
                  functions_cfg = project_cfg.get("functions", {})
                  entry = functions_cfg.get(fn)
                  if isinstance(entry, dict) and isinstance(entry.get("verify_jwt"), bool):
                      expected = entry["verify_jwt"]

          if expected is None:
              expected = True

          print("true" if expected else "false")
          PY
          )"
          echo "expected_verify_jwt=${expected}" >> "$GITHUB_OUTPUT"
          echo "Resolved verify_jwt contract for ${fn}: ${expected}"

      - name: Deploy function
        shell: bash
        run: |
          set -euo pipefail
          fn="${{ matrix.function }}"
          project="${{ secrets.SUPABASE_PROJECT_ID }}"
          expected="${{ steps.auth-contract.outputs.expected_verify_jwt }}"

          if [[ "${expected}" == "false" ]]; then
            echo "Deploying ${fn} with --no-verify-jwt (contract=false)"
            supabase functions deploy "${fn}" \
              --project-ref "${project}" \
              --no-verify-jwt
          else
            echo "Deploying ${fn} with default JWT verification (contract=true)"
            supabase functions deploy "${fn}" \
              --project-ref "${project}"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify verify_jwt drift guard
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/verify_jwt_drift_guard.sh
          scripts/verify_jwt_drift_guard.sh \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" \
            --functions "${{ matrix.function }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployed function endpoint
        shell: bash
        run: |
          set -euo pipefail
          endpoint="https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/${{ matrix.function }}"
          status=$(curl -sS -o /tmp/edge-function-response.txt -w "%{http_code}" "$endpoint" || true)
          if [[ "$status" == "000" || "$status" == "404" ]]; then
            echo "Function verification failed for ${{ matrix.function }} (HTTP $status)"
            cat /tmp/edge-function-response.txt || true
            exit 1
          fi
          echo "Verified ${{ matrix.function }} (HTTP $status)"

      - name: Deployment summary
        run: |
          echo "## Edge Function Deploy Result 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.function }} | ✅ Deployed + Verified |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint: \`https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/${{ matrix.function }}\`" >> $GITHUB_STEP_SUMMARY
