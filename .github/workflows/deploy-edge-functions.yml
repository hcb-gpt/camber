name: Deploy Edge Functions

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy ALL functions (full reconcile). Leave unchecked to deploy only changed.'
        required: false
        type: boolean
        default: true

jobs:
  discover-functions:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.resolve.outputs.functions }}
      count: ${{ steps.resolve.outputs.count }}
      mode: ${{ steps.resolve.outputs.mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve which functions to deploy
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_ALL: ${{ inputs.deploy_all }}
        run: |
          set -euo pipefail
          EXCLUDE_PATTERN='^(_shared|shadow-replay|project-query|striking-detect)$'

          # All deployable functions
          mapfile -t all_funcs < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | grep -Ev "$EXCLUDE_PATTERN")

          # Determine deploy mode
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$DEPLOY_ALL" == "true" ]]; then
              echo "mode=full-reconcile" >> "$GITHUB_OUTPUT"
            else
              echo "mode=changed-only-manual" >> "$GITHUB_OUTPUT"
            fi
            funcs=("${all_funcs[@]}")
          else
            # Push event: detect changed functions only
            mapfile -t changed_files < <(git diff --name-only HEAD~1 HEAD -- supabase/functions/ 2>/dev/null || true)

            # Check if _shared changed (affects all functions)
            shared_changed=false
            for f in "${changed_files[@]}"; do
              if [[ "$f" == supabase/functions/_shared/* ]]; then
                shared_changed=true
                break
              fi
            done

            if [[ "$shared_changed" == "true" ]]; then
              echo "::notice::_shared directory changed — deploying ALL functions"
              echo "mode=shared-changed" >> "$GITHUB_OUTPUT"
              funcs=("${all_funcs[@]}")
            else
              echo "mode=changed-only" >> "$GITHUB_OUTPUT"
              # Extract unique function directory names from changed files
              declare -A seen
              funcs=()
              for f in "${changed_files[@]}"; do
                # supabase/functions/<name>/... -> extract <name>
                dir=$(echo "$f" | sed -n 's|^supabase/functions/\([^/]*\)/.*|\1|p')
                if [[ -n "$dir" && -z "${seen[$dir]:-}" ]]; then
                  if echo "$dir" | grep -qE "$EXCLUDE_PATTERN"; then
                    continue
                  fi
                  seen[$dir]=1
                  funcs+=("$dir")
                fi
              done

              if [[ "${#funcs[@]}" -eq 0 ]]; then
                echo "::notice::No deployable function directories changed in this push"
                echo "functions=[]" >> "$GITHUB_OUTPUT"
                echo "count=0" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi

          json=$(printf '%s\n' "${funcs[@]}" | jq -Rsc 'split("\n")[:-1]')
          echo "functions=$json" >> "$GITHUB_OUTPUT"
          echo "count=${#funcs[@]}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${#funcs[@]} of ${#all_funcs[@]} functions"
          printf '  -> %s\n' "${funcs[@]}"

  deploy:
    needs: discover-functions
    if: needs.discover-functions.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(needs.discover-functions.outputs.functions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin to known-good version. `latest` caused deno.lock v5
          # incompatibility that broke 14/19 deploys. Bump intentionally.
          version: 2.76.8

      - name: Deploy function
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy "$FUNCTION_NAME" \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt

      - name: Verify deployed function endpoint
        shell: bash
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          endpoint="https://${PROJECT_REF}.supabase.co/functions/v1/${FUNCTION_NAME}"
          status=$(curl -sS -o /tmp/edge-function-response.txt -w "%{http_code}" "$endpoint" || true)
          if [[ "$status" == "000" || "$status" == "404" ]]; then
            echo "Function verification failed for $FUNCTION_NAME (HTTP $status)"
            cat /tmp/edge-function-response.txt || true
            exit 1
          fi
          echo "Verified $FUNCTION_NAME (HTTP $status)"

      - name: Deployment summary
        env:
          FUNCTION_NAME: ${{ matrix.function }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
          DEPLOY_MODE: ${{ needs.discover-functions.outputs.mode }}
        run: |
          echo "## Edge Function Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Function | Status | Mode |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| $FUNCTION_NAME | Deployed + Verified | $DEPLOY_MODE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint: \`https://${PROJECT_REF}.supabase.co/functions/v1/${FUNCTION_NAME}\`" >> $GITHUB_STEP_SUMMARY
