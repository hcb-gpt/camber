name: Agent-doc sync check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
  push:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Check AGENTS/CLAUDE drift
        run: |
          if [ -x "../orbit/scripts/agent-doc-sync.sh" ]; then
            ../orbit/scripts/agent-doc-sync.sh --check --repo-root "$GITHUB_WORKSPACE/.."
          else
            echo "agent-doc-sync.sh missing; skipping check"
            exit 0
          fi
