name: CamberRedline
options:
  bundleIdPrefix: com.heartwoodcustombuilders
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  CamberRedline:
    type: application
    supportedDestinations: [iOS]
    sources:
      - CamberRedline
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: CamberRedline/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.heartwoodcustombuilders.CamberRedline
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
    scheme:
      gatherCoverageData: false
