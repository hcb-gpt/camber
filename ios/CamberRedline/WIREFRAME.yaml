navigation_flow:
  entry_point: CamberRedlineApp
  graph:
    - screen: ContactListView
      type: NavigationStack root
      transitions:
        - target: ThreadView
          trigger: tap on ContactRow (NavigationLink)
          data_passed: Contact
    - screen: ThreadView
      type: pushed destination
      transitions:
        - target: CorrectionSheet
          trigger: swipe-trailing "Correct" or context menu "Correct" on ClaimRow
          data_passed: "onSubmit callback closure"
          presentation: .sheet
    - screen: CorrectionSheet
      type: modal sheet
      transitions:
        - target: dismiss
          trigger: "Cancel toolbar button or Submit Correction button"

state_ownership:
  description: >
    Both view models are created at the App level and passed down.
    ContactListViewModel is owned by CamberRedlineApp and injected into
    ContactListView. ThreadViewModel is also owned by CamberRedlineApp and
    shared — ThreadView receives it via parameter. This means thread state
    persists across navigation pops (no reload needed if returning to same contact).
  app_level_state:
    - "@State contactListViewModel: ContactListViewModel"
    - "@State threadViewModel: ThreadViewModel"
  injection_pattern: "direct parameter passing (not @Environment)"

known_limitations:
  - title: "Hardcoded anon key"
    description: >
      The Supabase anon key is hardcoded in SupabaseService.swift. No key
      rotation mechanism or config file exists. The key is committed to the
      repo in plaintext.
    severity: medium

  - title: "No user authentication"
    description: >
      The app has no login flow. All API calls use the anon key. The edge
      function runs with verify_jwt=false. The graded_by field is hardcoded
      to 'ios_reviewer'. There is no way to distinguish between multiple
      human reviewers.
    severity: medium

  - title: "Thread loaded via edge function, not PostgREST"
    description: >
      Contacts use the redline_contacts view via PostgREST (efficient),
      but threads are fetched from the edge function endpoint via raw
      URLSession. The edge function uses source_span_id joins which return
      fewer claims than the call_id path (known deficiency: only ~21% of
      claims visible for some contacts due to is_superseded filtering).
    severity: high

  - title: "Full thread reload after grading"
    description: >
      After gradeClaimViaAPI() succeeds, the entire thread is reloaded via
      loadThreadInternal(). Although Realtime subscription exists for
      in-place merging, the POST-then-reload pattern causes a redundant
      full fetch. Realtime alone would suffice.
    severity: low

  - title: "No pagination support in UI"
    description: >
      The edge function supports limit/offset pagination, but the iOS app
      hardcodes limit=100 and never requests subsequent pages. Contacts
      with more than 100 interactions will have older items truncated.
    severity: medium

  - title: "No offline support"
    description: >
      No local caching, Core Data, or SwiftData persistence. The app
      requires network connectivity for all operations. Queued grades are
      not supported — a failed grade POST shows an error but does not retry.
    severity: low

  - title: "No search or filtering"
    description: >
      No ability to search contacts, filter by claim type, filter by
      graded/ungraded status, or search within transcripts.
    severity: low

  - title: "Single shared ThreadViewModel"
    description: >
      One ThreadViewModel instance is shared for all contacts. Navigating
      to a different contact replaces the previous thread data. There is no
      per-contact caching.
    severity: low

  - title: "No haptic feedback on grade actions"
    description: >
      The iOS architecture spec called for manual UINotificationFeedbackGenerator
      (.success for confirm, .rigid for reject), but no explicit haptic
      code exists. Only system-default context menu haptics are present.
    severity: low

  - title: "Date parsing duplicated"
    description: >
      ISO8601 date parsing is independently implemented in both
      ContactRow (with 3 formatters including postgres format) and
      ThreadItem (with 2 formatters). No shared utility.
    severity: low

  - title: "SMS has no claim extraction"
    description: >
      SMS messages appear as chat bubbles but have no claims, no grading
      capability, and no pipeline integration. They are display-only.
    severity: info

  - title: "No empty state design"
    description: >
      When a contact has zero thread items, the screen shows nothing
      (no illustration, no message). The only empty state handling is
      the loading spinner while data is being fetched.
    severity: low

  - title: "portrait-only locked"
    description: >
      The app is locked to portrait orientation in project.yml. Landscape
      is not supported, which may be limiting on iPad.
    severity: info

  - title: "No iPad optimization"
    description: >
      The app is iPhone-focused with no iPad split-view or sidebar
      navigation adaptation. It will run on iPad but not use the screen
      efficiently.
    severity: low

  - title: "word_count field from API is unused"
    description: >
      The edge function returns word_count per span, but the SpanEntry
      model does not decode it. It is silently dropped.
    severity: info

  - title: "No TestFlight or CI"
    description: >
      No development team configured, no CI pipeline, no automated tests.
      Distribution is via Xcode direct install only (free Apple ID, 7-day
      re-sign cycle).
    severity: info

improvement_areas:
  - area: "Claim visibility"
    priority: high
    description: >
      Switch thread fetching from the edge function's source_span_id join
      path to using PostgREST against the redline_thread view, which uses
      the call_id join path and returns all claims (not just the ~21%
      visible through non-superseded spans).

  - area: "User identity for grading"
    priority: high
    description: >
      Replace the hardcoded 'ios_reviewer' graded_by value with actual
      user identification. Options: simple username prompt at launch,
      Supabase Auth integration, or device name.

  - area: "Grade-only optimistic update"
    priority: medium
    description: >
      After submitting a grade, update the local ClaimEntry immediately
      (optimistic) and rely on the Realtime subscription for confirmation,
      instead of doing a full thread reload. This would eliminate the
      redundant network round-trip.

  - area: "Pagination / infinite scroll"
    priority: medium
    description: >
      Implement infinite scroll in ThreadView using the edge function's
      offset parameter. Load initial batch, then fetch older items as the
      user scrolls up.

  - area: "Search and filtering"
    priority: medium
    description: >
      Add a search bar on ContactListView (by name/phone). Add filter
      chips on ThreadView to show only ungraded claims, or filter by
      claim type.

  - area: "Shared date parsing utility"
    priority: low
    description: >
      Extract the duplicated ISO8601/postgres date parsing into a single
      shared DateParser utility used by both ContactRow and ThreadItem.

  - area: "Empty and error states"
    priority: low
    description: >
      Design proper empty states with illustrations and helpful messages
      for: no contacts, no thread items, no claims. Improve error states
      beyond a small red caption at the bottom.

  - area: "Haptic feedback"
    priority: low
    description: >
      Add explicit UINotificationFeedbackGenerator calls for grade actions:
      .success for confirm, .error for reject, .warning or custom for
      correct. Adds tactile confirmation to the grading flow.

  - area: "iPad sidebar navigation"
    priority: low
    description: >
      Adapt ContactListView to use a sidebar/detail split on iPad using
      NavigationSplitView, showing contacts on the left and the thread
      on the right.

  - area: "Offline grade queue"
    priority: low
    description: >
      Queue grade submissions when offline and automatically retry when
      connectivity returns. Could use SwiftData or UserDefaults for
      persistence.

  - area: "Accessibility"
    priority: medium
    description: >
      No explicit accessibility labels, hints, or traits are defined.
      SwiftUI provides some automatic accessibility, but custom components
      like GradeIndicator and the swipe/context menu grading flow would
      benefit from explicit VoiceOver support.

  - area: "Grade statistics summary"
    priority: low
    description: >
      The web UI shows a stats bar (confirmed/rejected/corrected/ungraded
      counts) at the top of the thread. The iOS app does not. Adding this
      would give reviewers a progress overview.

  - area: "Pull-to-refresh delay"
    priority: low
    description: >
      Artificial Task.sleep delays (300ms on contacts, 500ms on thread)
      are added after refresh completes. These serve no functional purpose
      and slow down the UX. They were likely added to prevent the refresh
      indicator from dismissing too quickly, but could be shortened or
      removed.

  - area: "Claim type visual hierarchy"
    priority: low
    description: >
      Claim types (commitment, blocker, deadline, etc.) are shown as small
      gray capsule badges. Consider color-coding by type to make it easier
      to scan for high-priority claim types at a glance.
