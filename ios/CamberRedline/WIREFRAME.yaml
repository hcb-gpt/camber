                row_separator_tint: "Color(white: 0.2)"
                elements:
                  - name: initials_avatar
                    type: Text (initials from name)
                    font: system(size: 15, weight: .semibold)
                    foreground: white
                    frame: 44x44
                    background: "Color(white: 0.25)"
                    shape: Circle
                  - name: contact_name
                    type: Text
                    binding: contact.name
                    font: .body
                    weight: .semibold
                    foreground: white
                  - name: relative_time
                    type: Text
                    binding: "computed from contact.lastActivity"
                    font: .subheadline
                    foreground: .secondary
                    format: "now / Nm / Nh / Nd / MMM d"
                    position: trailing in name HStack
                  - name: interaction_type_icon
                    type: Image(systemName)
                    binding: "contact.lastInteractionType"
                    values:
                      sms: "message.fill"
                      call: "phone.fill"
                    font: .caption2
                    foreground: .secondary
                  - name: direction_arrow
                    type: Image(systemName)
                    binding: "contact.lastDirection"
                    values:
                      outbound: "arrow.up.right (blue)"
                      inbound: "arrow.down.left (green)"
                    font: .caption2
                  - name: preview_text
                    type: Text
                    binding: "contact.lastSnippet or fallback '{N} calls . {M} messages'"
                    font: .subheadline
                    foreground: .secondary
                    line_limit: 1
                  - name: ungraded_badge
                    type: Text
                    binding: contact.ungradedCount
                    condition: "ungradedCount > 0"
                    font: .caption
                    weight: .semibold
                    foreground: white
                    background: .orange
                    shape: Capsule
                    padding_h: 8
                    padding_v: 4
    overlays:
      - name: loading_spinner
        component: ProgressView
        tint: white
        condition: "isLoading && contacts.isEmpty"
      - name: error_banner
        component: Text
        alignment: .bottom
        font: .caption
        foreground: .red
        background: .ultraThinMaterial in RoundedRectangle(cornerRadius: 8)
        condition: "error != nil"
    interactions:
      - pull_to_refresh:
          action: contactListViewModel.loadContacts()
          post_delay_ms: 300
      - tap_row:
          action: "NavigationLink pushes ThreadView with selected Contact"
    lifecycle:
      - task_on_appear:
          - "loadContacts() if contacts.isEmpty"
          - "subscribeToNewInteractions()"
    realtime:
      - channel: new-interactions
        table: interactions
        event: INSERT
        trigger: "full contact list reload via reloadContactsFromRealtime()"

  thread_view:
    file: ThreadView.swift
    path: /Users/chadbarlow/gh/hcb-gpt/camber/ios/CamberRedline/CamberRedline/Views/ThreadView.swift
    role: pushed from contact_list via NavigationLink
    view_model: ThreadViewModel
    nav_title: "contact.name"
    nav_title_display_mode: .inline
    layout:
      - component: ScrollViewReader
        children:
          - component: ScrollView
