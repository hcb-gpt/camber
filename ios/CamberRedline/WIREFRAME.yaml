app:
  name: CamberRedline
  bundle_id: com.heartwoodcustombuilders.CamberRedline
  platform: iOS 17.0+
  framework: SwiftUI
  concurrency: Swift strict concurrency (complete)
  theme: dark_mode_forced  # .preferredColorScheme(.dark) at App and View level
  orientation: portrait_only
  package_manager: SPM
  dependencies:
    - name: Supabase
      source: https://github.com/supabase/supabase-swift.git
      version: ">=2.0.0"
      product: Supabase
  project_generator: XcodeGen (project.yml)
  marketing_version: "1.0.0"
  build_number: "1"
  development_team: ""  # unsigned — Xcode direct install (free Apple ID, 7-day re-sign)
  description: >
    A contact-threaded claim review app for the Camber pipeline. It displays
    per-contact conversation histories (phone calls and SMS) with embedded
    AI-extracted claims that a human reviewer can confirm, reject, or correct
    in real time. Designed as a CEO-facing tool for grading claim accuracy.

data_sources:
  supabase_project:
    ref: rjhdwidddtfetbwqolof
    url: https://rjhdwidddtfetbwqolof.supabase.co
    auth_mode: anon_key  # hardcoded in SupabaseService, no user auth
    verify_jwt: false  # edge function runs without JWT verification

  supabase_postgrest:
    views:
      - name: redline_contacts
        usage: contact list (sorted by last_activity DESC)
        queried_by: ContactListViewModel.loadContacts()
    tables_subscribed_via_realtime:
      - name: interactions
        event: INSERT
        channel_name: "new-interactions"
        trigger: reloads full contact list
      - name: claim_grades
        events: [INSERT, UPDATE]
        channel_name: "claim-grades-{contactId}"
        trigger: in-place grade merge on matching claimId

  edge_function:
    slug: redline-thread
    version: redline-thread_v1.0.0
    base_url: https://rjhdwidddtfetbwqolof.supabase.co/functions/v1/redline-thread
    auth: SUPABASE_SERVICE_ROLE_KEY (server-side, no client auth required)
    endpoints:
      - name: contacts
        method: GET
        params: "?action=contacts"
        returns: "{ok, contacts[], function_version, ms}"
        note: >
          iOS app does NOT use this endpoint — it queries the redline_contacts
          view via PostgREST instead. The edge function contacts endpoint is
          used only by the web HTML UI.
      - name: thread
        method: GET
        params: "?contact_id={uuid}&limit={int}&offset={int}"
        returns: "{ok, contact, thread[], pagination{total,limit,offset}, function_version, ms}"
        default_limit: 50
        max_limit: 200
        note: iOS app fetches threads from this endpoint via URLSession (not PostgREST).
      - name: grade
        method: POST
        body: "{claim_id, grade, correction_text?, graded_by}"
        valid_grades: [confirm, reject, correct]
        constraint: "correction_text required when grade=correct"
        upsert_conflict: "claim_id, graded_by"
        returns: "{ok, grade, function_version, ms}"
    also_serves:
      - name: html_ui
        method: GET
        params: no query params (or ?contact_id for deep link)
        returns: full HTML/CSS/JS single-page app (web v0)

screens:
