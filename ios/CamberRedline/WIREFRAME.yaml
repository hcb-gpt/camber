        description: "Subscribes to INSERT on interactions table; auto-reloads contacts on new rows"
      - name: unsubscribe
        access: public
        async: true
        description: "Cancels realtime subscription and removes channel"
      - name: reloadContactsFromRealtime
        access: private
        async: true
        description: "Silent reload (no isLoading flag) triggered by realtime event"

  ThreadViewModel:
    file: ThreadViewModel.swift
    path: /Users/chadbarlow/gh/hcb-gpt/camber/ios/CamberRedline/CamberRedline/ViewModels/ThreadViewModel.swift
    annotations: ["@MainActor", "@Observable"]
    state:
      - name: currentContact
        type: "Contact?"
        default: nil
      - name: threadItems
        type: "[ThreadItem]"
        default: "[]"
      - name: isLoading
        type: Bool
        default: false
      - name: error
        type: "String?"
        default: nil
    private_state:
      - name: service
        type: SupabaseService
        value: SupabaseService.shared
      - name: gradeChannel
        type: "RealtimeChannelV2?"
      - name: gradeInsertTask
        type: "Task<Void, Never>?"
      - name: gradeUpdateTask
        type: "Task<Void, Never>?"
      - name: subscribedContactId
        type: "UUID?"
    methods:
      - name: loadThread
        access: public
        async: true
        params: "contactId: UUID"
        description: >
          Fetches thread from edge function, converts RawThreadItem to ThreadItem,
          sorts chronologically (ascending by eventAtDate)
      - name: gradeClaim
        access: public
        async: true
        params: "claimId: UUID, grade: GradeType, correctionText: String?"
        description: >
          Submits grade via edge function POST endpoint with gradedBy='ios_reviewer',
          then reloads full thread
      - name: startClaimGradeSubscription
        access: public
        async: true
        params: "contactId: UUID"
        description: >
          Subscribes to INSERT and UPDATE on claim_grades table. Merges grade
          changes in-place without full thread reload.
      - name: stopClaimGradeSubscription
        access: public
        async: true
        description: "Cancels grade realtime tasks and removes channel"
      - name: applyGradeUpdate
        access: private
        params: "record: RealtimeGradeRecord"
        description: >
          Maps over threadItems -> call entries -> spans -> claims, replacing
          the matching claimId with updated grade/correctionText/gradedBy

