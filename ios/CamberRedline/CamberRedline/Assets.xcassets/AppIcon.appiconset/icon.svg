<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep dark gradient background -->
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#252528"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </radialGradient>

    <!-- Red gradient for the redline stroke -->
    <linearGradient id="redline" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2D20"/>
      <stop offset="50%" stop-color="#FF453A"/>
      <stop offset="100%" stop-color="#FF6961"/>
    </linearGradient>

    <!-- Bubble fill: subtle warm gray -->
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48484A"/>
      <stop offset="100%" stop-color="#3A3A3C"/>
    </linearGradient>

    <!-- Claim line glow -->
    <linearGradient id="claimGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5E5E7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E5E5E7" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Outer glow ring (very subtle, gives depth) -->
  <circle cx="512" cy="470" r="340" fill="none" stroke="#FF453A" stroke-width="1.5" opacity="0.12"/>

  <!-- Main chat bubble — rounded rectangle with tail -->
  <g transform="translate(512, 460)">
    <!-- Bubble body -->
    <rect x="-230" y="-195" width="460" height="340" rx="52" ry="52" fill="url(#bubbleFill)" opacity="0.95"/>

    <!-- Bubble tail (bottom-left, like incoming message) -->
    <path d="M -200 145 L -248 195 L -170 135" fill="#3A3A3C" opacity="0.95"/>

    <!-- Three claim lines inside the bubble (represent text/claims) -->
    <line x1="-160" y1="-105" x2="150"  y2="-105" stroke="url(#claimGlow)" stroke-width="18" stroke-linecap="round"/>
    <line x1="-160" y1="-40"  x2="120"  y2="-40"  stroke="url(#claimGlow)" stroke-width="18" stroke-linecap="round" opacity="0.6"/>
    <line x1="-160" y1="25"   x2="80"   y2="25"   stroke="url(#claimGlow)" stroke-width="18" stroke-linecap="round" opacity="0.35"/>

    <!-- Grading indicators on right side of claims -->
    <!-- Green check for first claim (confirmed) -->
    <g transform="translate(190, -105)">
      <polyline points="-10,5 -3,14 12,-6" fill="none" stroke="#30D158" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Red X for second claim (rejected) -->
    <g transform="translate(190, -40)" opacity="0.6">
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FF453A" stroke-width="6" stroke-linecap="round"/>
      <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FF453A" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Orange pencil dot for third claim (needs correction) -->
    <circle cx="190" cy="25" r="6" fill="#FF9F0A" opacity="0.35"/>
  </g>

  <!-- THE REDLINE: bold diagonal red stroke slashing across the whole icon -->
  <!-- This is the hero element — the brand mark -->
  <line
    x1="180" y1="780"
    x2="844" y2="220"
    stroke="url(#redline)"
    stroke-width="42"
    stroke-linecap="round"
  />

  <!-- Subtle red glow behind the redline for depth -->
  <line
    x1="180" y1="780"
    x2="844" y2="220"
    stroke="#FF453A"
    stroke-width="80"
    stroke-linecap="round"
    opacity="0.08"
  />

  <!-- Bottom text: "REDLINE" in small caps, very subtle -->
  <text
    x="512" y="870"
    text-anchor="middle"
    font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="18"
    fill="#E5E5E7"
    opacity="0.25"
  >REDLINE</text>
</svg>
